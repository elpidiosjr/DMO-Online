<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loja de Itens</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#111827,#000);
  color:var(--text);
  padding:16px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.coins{
  font-weight:bold;
}

/* BOTÃO VOLTAR */
.back-btn{
  background:transparent;
  border:1px solid #334155;
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  color:white;
  transition:.2s;
}
.back-btn:hover{
  background:#1e293b;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  border:1px solid #1e3a8a;
  transition:.2s;
  position:relative;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.name{
  font-weight:bold;
}

.desc{
  font-size:.8rem;
  color:var(--muted);
  margin:6px 0;
}

.price{
  font-weight:bold;
}

.owned{
  font-size:.8rem;
  color:#86efac;
}

/* BOTÕES */
.actions{
  display:flex;
  gap:6px;
  margin-top:8px;
}

.buy{
  flex:1;
  border:none;
  border-radius:999px;
  padding:6px;
  cursor:pointer;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  font-weight:bold;
}

.buy:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.buy.insufficient{
  background:var(--danger);
  color:white;
}

/* LOG */
.log{
  margin-top:20px;
  background:#020617;
  padding:10px;
  border-radius:10px;
  max-height:120px;
  overflow:auto;
  font-size:.8rem;
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="location.href='home.html'">⬅ Voltar</button>
  <div class="coins">💰 <span id="coins">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="log" id="log"></div>

<script>
const COINS_KEY = 'dc_coins_v1';
const ITEMS_KEY = 'dc_items_v1';

const items = [
  {id:'potion_small',name:'Poção +20HP',price:150},
  {id:'potion_medium',name:'Poção +50HP',price:300},
  {id:'atk_boost',name:'Booster ATK',price:260},
  {id:'def_boost',name:'Escudo DEF',price:260},
  {id:'xp_chip',name:'Chip XP',price:220},
];

function getCoins(){
  return JSON.parse(localStorage.getItem(COINS_KEY)) ?? 1000;
}
function setCoins(v){
  localStorage.setItem(COINS_KEY,JSON.stringify(v));
}

function getItems(){
  return JSON.parse(localStorage.getItem(ITEMS_KEY)) ?? [];
}
function setItems(v){
  localStorage.setItem(ITEMS_KEY,JSON.stringify(v));
}

function addItem(id){
  const list = getItems();
  let item = list.find(i=>i.id===id);
  if(!item){
    item={id,qty:0};
    list.push(item);
  }
  item.qty++;
  setItems(list);
}

function getQty(id){
  const item = getItems().find(i=>i.id===id);
  return item ? item.qty : 0;
}

function log(msg){
  const div=document.createElement('div');
  div.textContent=msg;
  document.getElementById('log').prepend(div);
}

function render(){
  document.getElementById('coins').textContent=getCoins();

  const grid=document.getElementById('grid');
  grid.innerHTML='';

  items.forEach(it=>{
    const coins=getCoins();
    const qty=getQty(it.id);

    const card=document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <div class="name">${it.name}</div>
      <div class="desc">Item útil em batalha</div>
      <div class="price">💰 ${it.price}</div>
      <div class="owned">Você tem: ${qty}</div>

      <div class="actions">
        <button class="buy" data-id="${it.id}" data-q="1">x1</button>
        <button class="buy" data-id="${it.id}" data-q="5">x5</button>
      </div>
    `;

    grid.appendChild(card);
  });

  document.querySelectorAll('.buy').forEach(btn=>{
    const id=btn.dataset.id;
    const q=parseInt(btn.dataset.q);
    const item=items.find(i=>i.id===id);
    const cost=item.price*q;

    if(getCoins()<cost){
      btn.classList.add('insufficient');
    }

    btn.onclick=()=>{
      let coins=getCoins();

      if(coins<cost){
        log('❌ Coins insuficientes');
        return;
      }

      coins-=cost;
      setCoins(coins);

      for(let i=0;i<q;i++) addItem(id);

      btn.innerText='✔';
      setTimeout(()=>btn.innerText='x'+q,600);

      log(`Comprou ${q}x ${item.name}`);
      render();
    };
  });
}

render();
</script>

</body>
</html>
