<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loja - Digimon</title>

<style>
/* =========================
   🎨 TEMA / VARIÁVEIS
========================= */
:root{
  --bg:#020617;
  --card:#0f172a;
  --glass:rgba(15,23,42,.7);
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#111827,#000);
  color:var(--text);
  padding:18px;
}

/* =========================
   🧩 HEADER
========================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back-btn{
  border:none;
  border-radius:999px;
  padding:7px 14px;
  cursor:pointer;
  background:var(--glass);
  color:white;
  border:1px solid rgba(56,189,248,.3);
  transition:.2s;
}
.back-btn:hover{
  background:#1e293b;
  transform:translateY(-1px);
}

.coins{
  font-weight:600;
  font-size:1rem;
}

/* =========================
   🛒 GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

/* =========================
   📦 CARD
========================= */
.card{
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:14px;
  border:1px solid rgba(56,189,248,.2);
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 35px rgba(0,0,0,.6);
}

.name{
  font-weight:700;
  font-size:1rem;
}

.desc{
  font-size:.8rem;
  color:var(--muted);
  margin:6px 0;
}

.price{
  font-weight:600;
}

.owned{
  font-size:.8rem;
  color:#86efac;
}

/* =========================
   🔘 BOTÕES
========================= */
.actions{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.buy{
  flex:1;
  border:none;
  border-radius:999px;
  padding:6px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#052e16;
  transition:.2s;
}

.buy:hover{
  transform:scale(1.05);
}

.buy.insufficient{
  background:var(--danger);
  color:white;
}

.buy:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* =========================
   📜 LOG
========================= */
.log{
  margin-top:20px;
  background:var(--glass);
  border:1px solid rgba(148,163,184,.2);
  padding:10px;
  border-radius:12px;
  max-height:140px;
  overflow:auto;
  font-size:.8rem;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="location.href='home.html'">
    ⬅ Voltar
  </button>
  <div class="coins">
    💰 <span id="coins">0</span>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- LOG -->
<div class="log" id="log"></div>

<script>
/* =========================
   💾 STORAGE
========================= */
const KEYS = {
  coins:'dc_coins_v1',
  items:'dc_items_v1'
};

function getCoins(){
  return JSON.parse(localStorage.getItem(KEYS.coins)) ?? 1000;
}
function setCoins(v){
  localStorage.setItem(KEYS.coins, JSON.stringify(v));
}

function getItems(){
  return JSON.parse(localStorage.getItem(KEYS.items)) ?? [];
}
function setItems(v){
  localStorage.setItem(KEYS.items, JSON.stringify(v));
}

function addItem(id){
  const list = getItems();
  let item = list.find(i=>i.id===id);
  if(!item){
    item={id,qty:0};
    list.push(item);
  }
  item.qty++;
  setItems(list);
}

function getQty(id){
  return getItems().find(i=>i.id===id)?.qty || 0;
}

/* =========================
   🛒 ITENS DA LOJA
========================= */
const shopItems = [
  {id:'potion_small',name:'Poção +20HP',price:150},
  {id:'potion_medium',name:'Poção +50HP',price:300},
  {id:'atk_boost',name:'Booster ATK',price:260},
  {id:'def_boost',name:'Escudo DEF',price:260},
  {id:'xp_chip',name:'Chip XP',price:220},
];

/* =========================
   📜 LOG
========================= */
function log(msg){
  const el=document.createElement('div');
  el.textContent=msg;
  document.getElementById('log').prepend(el);
}

/* =========================
   🎨 RENDER
========================= */
function render(){
  document.getElementById('coins').textContent = getCoins();

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  shopItems.forEach(item=>{
    const coins = getCoins();
    const qty = getQty(item.id);

    const card = document.createElement('div');
    card.className='card';

    card.innerHTML = `
      <div class="name">${item.name}</div>
      <div class="desc">Item útil em batalha</div>
      <div class="price">💰 ${item.price}</div>
      <div class="owned">Você tem: ${qty}</div>

      <div class="actions">
        <button class="buy" data-id="${item.id}" data-q="1">x1</button>
        <button class="buy" data-id="${item.id}" data-q="5">x5</button>
      </div>
    `;

    grid.appendChild(card);
  });

  bindButtons();
}

/* =========================
   🧠 EVENTOS
========================= */
function bindButtons(){
  document.querySelectorAll('.buy').forEach(btn=>{
    const id = btn.dataset.id;
    const q  = parseInt(btn.dataset.q);

    const item = shopItems.find(i=>i.id===id);
    const cost = item.price * q;

    if(getCoins() < cost){
      btn.classList.add('insufficient');
    }

    btn.onclick = ()=>{
      let coins = getCoins();

      if(coins < cost){
        log('❌ Coins insuficientes');
        return;
      }

      coins -= cost;
      setCoins(coins);

      for(let i=0;i<q;i++) addItem(id);

      btn.textContent='✔';
      setTimeout(()=>btn.textContent='x'+q,500);

      log(`Comprou ${q}x ${item.name}`);
      render();
    };
  });
}

/* INIT */
render();
</script>

</body>
</html>
